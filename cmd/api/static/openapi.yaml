openapi: 3.0.3
info:
  title: DriveBai API
  description: |
    DriveBai - Car Marketplace and Rental App API

    ## Authentication
    Most endpoints require a Bearer token in the Authorization header:
    ```
    Authorization: Bearer <access_token>
    ```

    ## Error Handling
    All errors return a JSON object with an `error` field containing `code` and `message`.

    Error codes:
    - `EMAIL_TAKEN` - Email already registered
    - `INVALID_CREDENTIALS` - Wrong email or password
    - `RATE_LIMITED` - Too many requests
    - `UNAUTHORIZED` - Authentication required
    - `TOKEN_EXPIRED` - Access token expired
    - `TOKEN_INVALID` - Invalid token
    - `INVALID_ROLE` - Invalid role specified
    - `INCOMPLETE_ONBOARDING` - Onboarding requirements not met
  version: 0.2.0
  contact:
    name: DriveBai Support
    email: support@drivebai.com

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.drivebai.com/api/v1
    description: Production server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: User
    description: User profile endpoints
  - name: Documents
    description: Document upload and management
  - name: Onboarding
    description: User onboarding flow
  - name: Listings
    description: Public car listings and favorites
  - name: Cars
    description: Car management for owners
  - name: Chats
    description: Real-time chat between drivers and owners
  - name: LeaseRequests
    description: Lease request lifecycle and payments
  - name: Accidents
    description: Accident report filing
  - name: Notifications
    description: In-app notifications
  - name: Admin
    description: Admin-only management endpoints

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a new user account and returns auth tokens immediately.
        User is logged in right after registration.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created and logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email (deprecated)
      description: |
        **DEPRECATED** - Email verification is no longer required.
        This endpoint returns success for backwards compatibility.
      deprecated: true
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: Authenticates a user and returns access and refresh tokens.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/token/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchanges a refresh token for a new access token and refresh token.
        The old refresh token is invalidated (token rotation).
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/password/forgot:
    post:
      tags: [Auth]
      summary: Request password reset
      description: |
        Sends a password reset link to the user's email.
        Always returns 202 to prevent email enumeration.
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '202':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password with token
      description: |
        Resets the user's password using the token from the reset link.
        All existing sessions are invalidated.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      description: Revokes the provided refresh token.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend OTP code (deprecated)
      description: |
        **DEPRECATED** - OTP is no longer used.
        This endpoint returns success for backwards compatibility.
      deprecated: true
      operationId: resendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendOTPRequest'
      responses:
        '202':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /me:
    get:
      tags: [User]
      summary: Get current user profile
      description: Returns the authenticated user's profile information.
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile:
    patch:
      tags: [User]
      summary: Update user profile
      description: |
        Updates the authenticated user's profile information.
        All fields are optional - only provided fields will be updated.
        Role can only be set to 'driver' or 'car_owner'.
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfileResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/photo:
    post:
      tags: [User]
      summary: Upload profile photo
      description: Uploads a profile photo for the authenticated user.
      operationId: uploadProfilePhoto
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG)
      responses:
        '200':
          description: Photo uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  profile_photo_url:
                    type: string
        '400':
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents:
    get:
      tags: [Documents]
      summary: Get user's documents
      description: Returns all documents uploaded by the authenticated user.
      operationId: getDocuments
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{type}:
    post:
      tags: [Documents]
      summary: Upload a document
      description: |
        Uploads a document of the specified type.
        If a document of the same type already exists, it will be replaced.
      operationId: uploadDocument
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [drivers_license, registration]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file (JPEG, PNG, PDF)
      responses:
        '201':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Invalid file type or document type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}:
    delete:
      tags: [Documents]
      summary: Delete a document
      description: Deletes the specified document.
      operationId: deleteDocument
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /onboarding/complete:
    post:
      tags: [Onboarding]
      summary: Complete onboarding
      description: |
        Marks the user's onboarding as complete.
        For drivers, required documents must be uploaded first.
      operationId: completeOnboarding
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Onboarding completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Onboarding requirements not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Listings ────────────────────────────────────────────────────────────────

  /listings:
    get:
      tags: [Listings]
      summary: List available car listings
      description: Public endpoint. Returns paginated, approved car listings with optional filters.
      operationId: listListings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: body_type
          in: query
          schema:
            type: string
            enum: [sedan, suv, hatchback, coupe, convertible, pickup, van, minivan, wagon]
        - name: fuel_type
          in: query
          schema:
            type: string
            enum: [petrol, diesel, electric, hybrid]
        - name: min_price
          in: query
          schema:
            type: number
        - name: max_price
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Paginated list of car listings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /listings/{listingId}/like:
    post:
      tags: [Listings]
      summary: Like a listing
      operationId: likeListing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/listingId'
      responses:
        '200':
          description: Listing liked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Listings]
      summary: Unlike a listing
      operationId: unlikeListing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/listingId'
      responses:
        '200':
          description: Listing unliked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me/likes:
    get:
      tags: [Listings]
      summary: Get liked listings
      operationId: getLikedListings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of liked car listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarListing'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /listings/{listingId}/lease-requests:
    post:
      tags: [Listings]
      summary: Create a lease request for a listing
      operationId: createLeaseRequestFromListing
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/listingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeaseRequest'
      responses:
        '201':
          description: Lease request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Cars ─────────────────────────────────────────────────────────────────────

  /cars:
    get:
      tags: [Cars]
      summary: List my cars
      operationId: listMyCars
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of cars owned by the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarListing'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Cars]
      summary: Create a car listing
      operationId: createCar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCarRequest'
      responses:
        '201':
          description: Car listing created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarListing'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cars/{carId}:
    get:
      tags: [Cars]
      summary: Get a specific car
      operationId: getCar
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
      responses:
        '200':
          description: Car details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarListing'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Cars]
      summary: Update a car listing
      operationId: updateCar
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCarRequest'
      responses:
        '200':
          description: Car updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarListing'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Cars]
      summary: Delete a car listing
      operationId: deleteCar
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
      responses:
        '200':
          description: Car deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /cars/{carId}/pause:
    post:
      tags: [Cars]
      summary: Toggle pause status
      description: Pauses an active listing or resumes a paused one.
      operationId: pauseCar
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
      responses:
        '200':
          description: Pause status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /cars/{carId}/location:
    put:
      tags: [Cars]
      summary: Update car location
      operationId: updateCarLocation
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - latitude
                - longitude
              properties:
                latitude:
                  type: number
                  format: double
                  example: 51.509865
                longitude:
                  type: number
                  format: double
                  example: -0.118092
                area:
                  type: string
                  example: "Central London"
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cars/{carId}/photos:
    get:
      tags: [Cars]
      summary: List car photos
      operationId: listCarPhotos
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
      responses:
        '200':
          description: List of car photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarPhoto'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Cars]
      summary: Upload a car photo
      operationId: uploadCarPhoto
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - slot_type
              properties:
                file:
                  type: string
                  format: binary
                slot_type:
                  type: string
                  enum: [cover_front, right, left, back, dashboard]
      responses:
        '201':
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarPhoto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cars/{carId}/photos/{photoId}:
    delete:
      tags: [Cars]
      summary: Delete a car photo
      operationId: deleteCarPhoto
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/carId'
        - name: photoId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Photo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Chats ───────────────────────────────────────────────────────────────────

  /chats:
    get:
      tags: [Chats]
      summary: List my chats
      operationId: listChats
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of chats for the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Chats]
      summary: Find or create a chat for a car
      operationId: findOrCreateChat
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - car_id
              properties:
                car_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Existing or newly created chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chats/{chatId}:
    get:
      tags: [Chats]
      summary: Get chat details
      operationId: getChat
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/chatId'
      responses:
        '200':
          description: Chat details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /chats/{chatId}/messages:
    get:
      tags: [Chats]
      summary: List messages in a chat
      operationId: listMessages
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/chatId'
        - name: before
          in: query
          description: Cursor — return messages before this message ID (for pagination)
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Chats]
      summary: Send a message
      operationId: sendMessage
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/chatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body
              properties:
                body:
                  type: string
                  example: "Is the car available next week?"
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chats/{chatId}/requests:
    get:
      tags: [Chats]
      summary: List in-chat requests
      operationId: listChatRequests
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/chatId'
      responses:
        '200':
          description: List of in-chat action requests
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /chats/{chatId}/lease-requests:
    get:
      tags: [Chats]
      summary: List lease requests in a chat
      operationId: listChatLeaseRequests
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/chatId'
      responses:
        '200':
          description: Lease requests for this chat
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Lease Requests ──────────────────────────────────────────────────────────

  /lease-requests/{id}/accept:
    post:
      tags: [LeaseRequests]
      summary: Accept a lease request
      operationId: acceptLeaseRequest
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/leaseId'
      responses:
        '200':
          description: Lease request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /lease-requests/{id}/decline:
    post:
      tags: [LeaseRequests]
      summary: Decline a lease request
      operationId: declineLeaseRequest
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/leaseId'
      responses:
        '200':
          description: Lease request declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /lease-requests/{id}/cancel:
    post:
      tags: [LeaseRequests]
      summary: Cancel a lease request
      operationId: cancelLeaseRequest
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/leaseId'
      responses:
        '200':
          description: Lease request cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /lease-requests/{id}/price:
    patch:
      tags: [LeaseRequests]
      summary: Update offered price
      operationId: updateLeasePrice
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/leaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - offered_weekly_price
              properties:
                offered_weekly_price:
                  type: number
                  example: 350.00
      responses:
        '200':
          description: Price updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /lease-requests/{id}/payments/intent:
    post:
      tags: [LeaseRequests]
      summary: Create Stripe payment intent
      description: Creates a Stripe PaymentIntent for the lease. Returns client_secret for the iOS SDK.
      operationId: createPaymentIntent
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/leaseId'
      responses:
        '200':
          description: Payment intent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_secret:
                    type: string
                  publishable_key:
                    type: string
                  amount:
                    type: integer
                    description: Amount in smallest currency unit (e.g. cents)
                  currency:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Accidents ───────────────────────────────────────────────────────────────

  /accidents:
    post:
      tags: [Accidents]
      summary: Create accident report (draft)
      operationId: createAccident
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lease_request_id:
                  type: string
                  format: uuid
                accident_description:
                  type: string
                driver1_info:
                  type: object
                  description: Driver 1 contact and license info
                driver2_info:
                  type: object
                  description: Driver 2 contact and license info
                vehicle_damage:
                  type: string
      responses:
        '201':
          description: Accident report created as draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccidentReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Accidents]
      summary: List my accident reports
      operationId: listAccidents
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of accident reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccidentReport'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accidents/{id}:
    get:
      tags: [Accidents]
      summary: Get accident report
      operationId: getAccident
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accidentId'
      responses:
        '200':
          description: Accident report details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccidentReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Accidents]
      summary: Update accident report fields
      operationId: patchAccident
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accident_description:
                  type: string
                driver1_info:
                  type: object
                driver2_info:
                  type: object
                vehicle_damage:
                  type: string
      responses:
        '200':
          description: Accident report updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccidentReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accidents/{id}/attachments:
    post:
      tags: [Accidents]
      summary: Upload photo attachment
      operationId: uploadAccidentAttachment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accidentId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Attachment uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  file_url:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accidents/{id}/sign:
    post:
      tags: [Accidents]
      summary: Add signature to report
      operationId: signAccident
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accidentId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Signature image (PNG)
      responses:
        '200':
          description: Signature saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /accidents/{id}/submit:
    post:
      tags: [Accidents]
      summary: Submit accident report
      description: Transitions the report from draft to submitted status. Cannot be edited after submission.
      operationId: submitAccident
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accidentId'
      responses:
        '200':
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccidentReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Notifications ───────────────────────────────────────────────────────────

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      operationId: listNotifications
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      operationId: markNotificationRead
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All notifications marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Admin ───────────────────────────────────────────────────────────────────

  /admin/users:
    get:
      tags: [Admin]
      summary: List all users
      operationId: adminListUsers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: q
          in: query
          description: Search by email or name
          schema:
            type: string
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get user detail
      operationId: adminGetUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/users/{id}/block:
    patch:
      tags: [Admin]
      summary: Block or unblock a user
      operationId: adminBlockUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - blocked
              properties:
                blocked:
                  type: boolean
      responses:
        '200':
          description: Block status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/cars:
    get:
      tags: [Admin]
      summary: List all car listings
      operationId: adminListCars
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, paused, rejected]
      responses:
        '200':
          description: Paginated car listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/cars/{id}/approve:
    patch:
      tags: [Admin]
      summary: Approve a car listing
      operationId: adminApproveCar
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - approved
              properties:
                approved:
                  type: boolean
                reason:
                  type: string
                  description: Rejection reason (when approved=false)
      responses:
        '200':
          description: Approval status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/rents:
    get:
      tags: [Admin]
      summary: List all active rentals
      operationId: adminListRents
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Paginated rental list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/accidents:
    get:
      tags: [Admin]
      summary: List all accident reports
      operationId: adminListAccidents
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, under_review, resolved]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Paginated accident report list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/accidents/{id}/status:
    patch:
      tags: [Admin]
      summary: Update accident report status
      operationId: adminUpdateAccidentStatus
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [under_review, resolved, rejected]
                note:
                  type: string
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  parameters:
    carId:
      name: carId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    chatId:
      name: chatId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    listingId:
      name: listingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    leaseId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    accidentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    userId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - first_name
        - last_name
        - role
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        phone:
          type: string
          example: "+1234567890"
        role:
          type: string
          enum: [driver, car_owner]
          example: driver

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserProfile'

    VerifyEmailRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: ^\d{6}$
          example: "123456"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required:
        - token
        - new_password
      properties:
        token:
          type: string
          description: Token from password reset email
        new_password:
          type: string
          format: password
          minLength: 8

    ResendOTPRequest:
      type: object
      required:
        - email
        - purpose
      properties:
        email:
          type: string
          format: email
        purpose:
          type: string
          enum: [verify_email, reset_password]

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [driver, car_owner, admin]
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
          nullable: true
        is_email_verified:
          type: boolean
        onboarding_status:
          type: string
          enum: [created, role_selected, photo_uploaded, documents_uploaded, complete]
        profile_photo_url:
          type: string
          nullable: true

    UpdateProfileRequest:
      type: object
      properties:
        role:
          type: string
          enum: [driver, car_owner]
          description: User role (cannot be set to admin via API)
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
          nullable: true

    UpdateProfileResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserProfile'

    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [drivers_license, registration]
        file_name:
          type: string
        file_size:
          type: integer
        status:
          type: string
          enum: [uploaded, verified, rejected]
        created_at:
          type: string
          format: date-time

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID_INPUT
            message:
              type: string
              example: Email is required

    CarListing:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        title:
          type: string
          example: "2022 Toyota Camry — Great Condition"
        make:
          type: string
          example: Toyota
        model:
          type: string
          example: Camry
        year:
          type: integer
          example: 2022
        body_type:
          type: string
          enum: [sedan, suv, hatchback, coupe, convertible, pickup, van, minivan, wagon]
        fuel_type:
          type: string
          enum: [petrol, diesel, electric, hybrid]
        weekly_rent_price:
          type: number
          example: 400.00
        currency:
          type: string
          example: AED
        status:
          type: string
          enum: [pending, approved, paused, rejected]
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        area:
          type: string
          nullable: true
          example: "Dubai Marina"
        created_at:
          type: string
          format: date-time

    CreateCarRequest:
      type: object
      required:
        - title
        - make
        - model
        - year
        - body_type
        - fuel_type
        - weekly_rent_price
        - currency
      properties:
        title:
          type: string
          example: "2022 Toyota Camry — Great Condition"
        make:
          type: string
          example: Toyota
        model:
          type: string
          example: Camry
        year:
          type: integer
          example: 2022
        body_type:
          type: string
          enum: [sedan, suv, hatchback, coupe, convertible, pickup, van, minivan, wagon]
        fuel_type:
          type: string
          enum: [petrol, diesel, electric, hybrid]
        mileage:
          type: integer
          example: 35000
        weekly_rent_price:
          type: number
          example: 400.00
        currency:
          type: string
          example: AED
        deposit_amount:
          type: number
          nullable: true
          example: 1000.00
        is_for_rent:
          type: boolean
          default: true
        is_for_sale:
          type: boolean
          default: false
        sale_price:
          type: number
          nullable: true
        min_years_licensed:
          type: integer
          example: 2

    CarPhoto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        car_id:
          type: string
          format: uuid
        slot_type:
          type: string
          enum: [cover_front, right, left, back, dashboard]
        file_url:
          type: string
          example: "/uploads/cars/abc123/cover_front_uuid.jpg"
        file_size:
          type: integer
          example: 204800
        mime_type:
          type: string
          example: image/jpeg

    Chat:
      type: object
      properties:
        id:
          type: string
          format: uuid
        car_id:
          type: string
          format: uuid
        driver_id:
          type: string
          format: uuid
